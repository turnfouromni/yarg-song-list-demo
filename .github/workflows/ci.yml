name: CI

on:
  pull_request:
  push:
    branches-ignore: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test
        run: npm test
      - name: Smoke build (offline)
        run: NO_ART=1 node build.mjs
