<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YARG Song List</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='15'>🎸</text></svg>">
<style>/*__CSS__*/</style>
</head>
<body>
<header>
  <div class="row1">
    <span class="yarg-icons" aria-hidden="true">
      <img src="assets/icons/guitar.png" alt="">
      <img src="assets/icons/bass.png" alt="">
      <img src="assets/icons/vocals.png" alt="">
      <img src="assets/icons/keys.png" alt="">
    </span>
    <h1>YARG Song List</h1>
    <span class="count" id="count"></span>
    <button class="toolbtn small random-btn" id="random-btn">Pick a Random Song</button>
  </div>
  <div class="controls">
    <input type="search" id="search" placeholder="Search song or artist…" autocomplete="off" spellcheck="false">
    <div class="ctl-actions">
      <div class="sortgroup">
        <span class="sortlabel">Sort by</span>
        <div class="sort-radios" id="sortgroup">
          <label><input type="radio" name="sort" value="artist" checked> Artist</label>
          <label><input type="radio" name="sort" value="name"> Song Name</label>
        </div>
      </div>
      <div class="ctl-buttons">
        <div class="dropdown" id="genre-dd">
          <button class="toolbtn" id="genre-btn" aria-haspopup="true" aria-expanded="false">Genres</button>
          <div class="dropdown-panel" id="genre-panel" hidden></div>
        </div>
        <button class="toolbtn" id="collapse-toggle">Collapse</button>
        <button class="toolbtn icon-btn" id="reset-btn" aria-label="Reset filters" title="Reset filters">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
    </div>
  </div>
</header>

<div class="modal-overlay" id="random-modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-label="Random song">
    <button class="modal-close" id="modal-close" aria-label="Close">×</button>
    <div id="random-content"></div>
    <div class="modal-actions">
      <button class="toolbtn random-btn" id="reroll-btn">Pick a new random song</button>
    </div>
  </div>
</div>

<div class="layout">
  <main id="main"></main>
</div>

<script id="song-data" type="application/json">/*__DATA__*/</script>
<script>/*__JS__*/</script>
</body>
</html>
